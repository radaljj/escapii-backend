name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p /opt/escapii/backend/

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/backend-0.0.1-SNAPSHOT.jar
          target: /opt/escapii/backend/
          strip_components: 1

      - name: Rename JAR and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mv /opt/escapii/backend/backend-0.0.1-SNAPSHOT.jar /opt/escapii/backend/app.jar
            systemctl restart escapii-backend

      - name: Patch Nginx for SSE (proxy_buffering off)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            NGINX_CONF=$(grep -rl "api.escapii.rs" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -1)
            [ -z "$NGINX_CONF" ] && echo "Nginx config not found, skipping" && exit 0
            grep -q "notifications/stream" "$NGINX_CONF" && echo "SSE already patched, skipping" && exit 0
            printf '    location /api/admin/notifications/stream {\n        proxy_pass http://127.0.0.1:8080;\n        proxy_http_version 1.1;\n        proxy_set_header Connection "";\n        proxy_buffering off;\n        proxy_cache off;\n        proxy_read_timeout 3600s;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        add_header Cache-Control no-cache;\n        add_header X-Accel-Buffering no;\n    }\n' > /tmp/sse_block.conf
            python3 -c "
            import sys
            conf=open('$NGINX_CONF').read()
            block=open('/tmp/sse_block.conf').read()
            marker='location / {'
            if marker not in conf:
              print('location / { not found in nginx config')
              sys.exit(1)
            open('$NGINX_CONF','w').write(conf.replace(marker, block+'\n    '+marker, 1))
            print('SSE block injected into '+('$NGINX_CONF'))
            "
            nginx -t && systemctl reload nginx && echo "Nginx reloaded successfully"
