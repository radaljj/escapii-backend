name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p /opt/escapii/backend/

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/backend-0.0.1-SNAPSHOT.jar
          target: /opt/escapii/backend/
          strip_components: 1

      - name: Rename JAR and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mv /opt/escapii/backend/backend-0.0.1-SNAPSHOT.jar /opt/escapii/backend/app.jar
            systemctl restart escapii-backend

      - name: Patch Nginx for SSE (proxy_buffering off)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            NGINX_CONF=$(grep -rl "api.escapii.rs" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -1)
            if [ -z "$NGINX_CONF" ]; then
              echo "Nginx config not found, skipping SSE patch"
              exit 0
            fi
            # Dodaj SSE location blok ako već ne postoji
            if ! grep -q "notifications/stream" "$NGINX_CONF"; then
              SSE_BLOCK='
    # SSE — real-time notifikacije (proxy buffering mora biti off)
    location /api/admin/notifications/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }'
              # Ubaci blok PRE generalnog location / bloka
              sed -i "s|location / {|${SSE_BLOCK}\n\n    location / {|" "$NGINX_CONF"
              nginx -t && systemctl reload nginx
              echo "Nginx SSE patch applied and reloaded"
            else
              echo "Nginx SSE config already present, skipping"
            fi
