# =============================================
# DATABASE - sve vrednosti dolaze iz env promenljivih
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/escapii_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# HIKARI CONNECTION POOL
# =============================================
# Default je 10 - dižemo na 20; deli Postgres sa WordPress-om pa ne idemo previše visoko
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
# Koliko čekamo na slobodnu konekciju pre nego što bacimo timeout (ms)
spring.datasource.hikari.connection-timeout=20000
# Konekcija koja čeka u idle pool-u se zatvara posle 10 minuta
spring.datasource.hikari.idle-timeout=600000
# Maksimalno vreme života konekcije - sprečava stale connections (30 min)
spring.datasource.hikari.max-lifetime=1800000
# Keepalive ping svakih 2 minuta - sprečava da DB/firewall ubije idle konekcije
spring.datasource.hikari.keepalive-time=120000

# JPA / Hibernate
# LOKALNO: postavi DDL_AUTO=update u application-local.properties
# PRODUKCIJA: validate - ne dira shemu, samo validira da je konzistentna
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JSON - pretty print (true samo za lokalni razvoj, false u produkciji)
# =============================================
spring.jackson.serialization.indent-output=${JSON_INDENT:false}

# =============================================
# EMAIL - Gmail SMTP
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Lokalni razvoj: postavi prave vrednosti u application-local.properties
# Produkcija: postavi env varijable na Render
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}
server.servlet.context-path=/
# Maksimalna velicina HTTP requesta: 10KB za standardne req, 5MB za upload slika
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.max-file-size=5MB
# Vrati 404 umesto stack trace-a za neumapovane /api/ putanje
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# =============================================
# APLIKACIJA - custom properties
# =============================================
# FROM adresa za slanje mejlova (mora biti verifikovana kod mail provajdera)
app.mail-from=${MAIL_FROM:escapii.team@gmail.com}
# Email adresa tima Escapii (prima sve nove uupite)
app.team-email=${TEAM_EMAIL:escapii.team@gmail.com}
# Operativni email - prima jutarnje podsetnike (ko kupuje karte, prognoza, destinacija)
app.ops-email=${OPS_EMAIL:escapii.team@gmail.com}
# Dozvoljeni origin za CORS (tvoj WordPress sajt)
app.cors-allowed-origin=${CORS_ALLOWED_ORIGIN:https://escapii.com}
# Extra CORS origins - SAMO za lokalni razvoj (ostaviti prazno u produkciji!)
app.cors-extra-origins=${CORS_EXTRA_ORIGINS:}
# Javni URL frontenda - koristi se za magic link u reveal emailu
app.frontend-url=${FRONTEND_URL:https://escapii.com}
# Javni URL backenda - koristi se za logo u email templateima
# OBAVEZNO postavi BACKEND_URL env var u produkciji!
app.backend-url=${BACKEND_URL}
# Bazni URL za QR kod na vaučeru (kod se dodaje kao ?code=...)
escapii.voucher.redeem-url=${VOUCHER_REDEEM_URL:https://escapii.rs/poklon}
# Thymeleaf se koristi standalone (za PDF generisanje) - web auto-config nije potreban
spring.thymeleaf.enabled=false

# Direktorijum za upload slika destinacija (apsolutna putanja u produkciji via UPLOADS_DIR env var)
app.uploads.dir=${UPLOADS_DIR:uploads}

# Admin API kljuc - OBAVEZNO postavi ADMIN_KEY env var u produkciji!
# Lokalno: koristi vrednost iz .env ili application-local.properties
# NIKAD ne ostavljaj default vrednost u produkciji
app.admin-key=${ADMIN_KEY:local-dev-only-change-in-production}

# =============================================
# KOMPANIJA - podaci za fakturu (profakturu)
# Placeholder vrednosti - popuniti kada firma bude registrovana
# =============================================
app.company.name=${COMPANY_NAME:Escapii d.o.o.}
app.company.address=${COMPANY_ADDRESS:Beograd\, Srbija}
app.company.pib=${COMPANY_PIB:000000000}
app.company.mb=${COMPANY_MB:00000000}
app.company.account=${COMPANY_ACCOUNT:000-0000000000000-00}
app.company.bank=${COMPANY_BANK:placeholder banka}
app.company.email=${COMPANY_EMAIL:hello@escapii.rs}
app.company.website=${COMPANY_WEBSITE:escapii.rs}
# Rok plaćanja u danima od datuma izdavanja
app.invoice.due-days=${INVOICE_DUE_DAYS:3}
