# =============================================
# DATABASE — sve vrednosti dolaze iz env promenljivih
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/escapii_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# LOKALNO: postavi DDL_AUTO=update u application-local.properties
# PRODUKCIJA: validate — ne dira shemu, samo validira da je konzistentna
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JSON — pretty print (true samo za lokalni razvoj, false u produkciji)
# =============================================
spring.jackson.serialization.indent-output=${JSON_INDENT:false}

# =============================================
# EMAIL — Gmail SMTP
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Lokalni razvoj: postavi prave vrednosti u application-local.properties
# Produkcija: postavi env varijable na Render
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}
server.servlet.context-path=/
# Maksimalna velicina HTTP requesta: 10KB (zastita od memory exhaustion)
spring.servlet.multipart.max-request-size=10KB
spring.servlet.multipart.max-file-size=10KB

# =============================================
# APLIKACIJA — custom properties
# =============================================
# FROM adresa za slanje mejlova (mora biti verifikovana kod mail provajdera)
app.mail-from=${MAIL_FROM:escapii.team@gmail.com}
# Email adresa tima Escapii (prima sve nove uupite)
app.team-email=${TEAM_EMAIL:escapii.team@gmail.com}
# Operativni email — prima jutarnje podsetnike (ko kupuje karte, prognoza, destinacija)
app.ops-email=${OPS_EMAIL:escapii.team@gmail.com}
# Dozvoljeni origin za CORS (tvoj WordPress sajt)
app.cors-allowed-origin=${CORS_ALLOWED_ORIGIN:https://escapii.com}
# Extra CORS origins — SAMO za lokalni razvoj (ostaviti prazno u produkciji!)
app.cors-extra-origins=${CORS_EXTRA_ORIGINS:}
# Javni URL frontenda — koristi se za magic link u reveal emailu
app.frontend-url=${FRONTEND_URL:https://escapii.com}
# Admin API kljuc — OBAVEZNO postavi ADMIN_KEY env var u produkciji!
# Lokalno: koristi vrednost iz .env ili application-local.properties
# NIKAD ne ostavljaj default vrednost u produkciji
app.admin-key=${ADMIN_KEY:local-dev-only-change-in-production}
